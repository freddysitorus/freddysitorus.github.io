<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freddy Sitorus</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background-color: #f7f7f7;
    }

    nav {
      background-color: #18392b;
      padding: 18px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
  color: white;
  font-size: 1.3rem;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.nav-links a {
  color: white;
  text-decoration: none;
  font-size: 0.95rem;
  font-weight: 500;
}

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 1rem;
      transition: opacity 0.2s ease;
    }

    .nav-links a:hover {
      opacity: 0.8;
    }

    .hero {
      padding: 80px 40px;
      text-align: center;
    }

    .hero h1 {
      font-size: 2.5rem;
      color: #18392b;
      margin-bottom: 16px;
    }

    .hero p {
      font-size: 1.1rem;
      color: #444;
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">My Website</div>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#education">Education</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#research">Research</a></li>
    </ul>
  </nav>

  <section class="hero">
    <h1>Welcome to My Website</h1>
    <p>This is the starting point for my portfolio.</p>
  </section>
</body>
</html>
